name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: beritakarya
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: beritakarya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    env:
      DATABASE_URL: postgresql://beritakarya:dev123@localhost:5432/beritakarya_test
      DIRECT_URL: postgresql://beritakarya:dev123@localhost:5432/beritakarya_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key-min-32-chars-here
      NODE_ENV: test

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @beritakarya/api db:generate

      - name: Run Prisma Migrations
        run: pnpm --filter @beritakarya/api db:migrate:deploy

      - name: Test
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

  e2e-playwright:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: beritakarya
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: beritakarya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    env:
      DATABASE_URL: postgresql://beritakarya:dev123@localhost:5432/beritakarya_test
      DIRECT_URL: postgresql://beritakarya:dev123@localhost:5432/beritakarya_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-key-min-32-chars-here
      NODE_ENV: test
      NEXT_PUBLIC_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      API_URL: http://127.0.0.1:3001

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @beritakarya/api db:generate

      - name: Run Prisma Migrations
        run: pnpm --filter @beritakarya/api db:migrate:deploy

      - name: Install Playwright Browsers
        run: pnpm --filter @beritakarya/web exec playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: pnpm --filter @beritakarya/web e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
