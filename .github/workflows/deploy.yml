name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Test ───────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: beritakarya
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: beritakarya_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s
    env:
      DATABASE_URL: postgresql://beritakarya:dev123@localhost:5432/beritakarya_test
      DIRECT_URL: postgresql://beritakarya:dev123@localhost:5432/beritakarya_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-key-min-32-chars-here
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && pnpm db:generate && pnpm db:migrate:deploy
      - run: pnpm turbo run test
      - run: pnpm turbo run lint type-check

  # ── 2. Build & Push ───────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image names
        id: image_names
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "web=ghcr.io/${REPO}/web" >> $GITHUB_OUTPUT
          echo "api=ghcr.io/${REPO}/api" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: ${{ steps.image_names.outputs.web }}:latest,${{ steps.image_names.outputs.web }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ steps.image_names.outputs.api }}:latest,${{ steps.image_names.outputs.api }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy Staging & Production ───────────────────────
  # [Dinonaktifkan sementara untuk Manual Deployment ke VPS]
  # Jika ingin mengaktifkan kembali CD (Continuous Deployment),
  # silakan lihat riwayat Git untuk mengembalikan konfigurasi ini.
