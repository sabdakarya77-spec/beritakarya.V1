events {
  worker_connections 1024;
}

http {
  # --- GZIP COMPRESSION (INFRA-6) ---
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

  upstream frontend {
    server web:3000;
  }

  upstream backend {
    server api:3001;
  }

  # Redirect HTTP ke HTTPS
  server {
    listen 80;
    server_name *.beritakarya.co;
    return 301 https://$host$request_uri;
  }

  # Main site handler
  server {
    listen 443 ssl;
    server_name *.beritakarya.co;

    # [H-015] Environment Variable untuk SSL Path
    ssl_certificate     ${SSL_CERT_PATH:-/etc/ssl/certs/beritakarya.crt};
    ssl_certificate_key ${SSL_KEY_PATH:-/etc/ssl/private/beritakarya.key};

    # [H-013] Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Media Uploads → batasi CORS (INFRA-4)
    location /uploads/ {
      proxy_pass http://backend/uploads/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      
      # Timpa header bawaan backend yang mungkin wildcard (*)
      proxy_hide_header Access-Control-Allow-Origin;
      add_header Access-Control-Allow-Origin "https://beritakarya.co" always;
      add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # API routes → backend
    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else → frontend
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
    }
  }
}