user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  keepalive_timeout 65;
  server_tokens   off;

  # Rate limiting
  limit_req_zone  $binary_remote_addr zone=api:10m   rate=20r/s;
  limit_req_zone  $binary_remote_addr zone=auth:10m  rate=5r/s;
  limit_req_status 429;

  # HTTP to HTTPS Redirect
  server {
    listen 80;
    server_name api.beritakarya.co beritakarya.co www.beritakarya.co;
    return 301 https://$host$request_uri;
  }

  # API & Media Server
  server {
    listen 443 ssl http2;
    server_name api.beritakarya.co;

    ssl_certificate     /etc/ssl/beritakarya/fullchain.pem;
    ssl_certificate_key /etc/ssl/beritakarya/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 15M;

    # CORS Helper Variables
    set $cors_origin "";
    if ($http_origin ~* "^https://(www\.beritakarya\.co|beritakarya\.co|[^/]+\.beritakarya\.co|[^/]+\.vercel\.app)$") {
      set $cors_origin $http_origin;
    }

    # 1. Direct Media Serving
    # Blokir akses langsung Nginx ke berkas KYC sensitif (harus dilayani Express API agar lolos audit & watermark)
    location /api/v1/media/uploads/kyc/ {
      deny all;
      return 403;
    }

    location /api/v1/media/uploads/ {
      alias /opt/beritakarya/uploads/;  # Path host VPS (bukan path Docker internal)
      expires 365d;
      add_header Cache-Control "public, immutable";
      add_header Vary "Accept";
      add_header Access-Control-Allow-Origin "*" always;
    }

    # 2. Auth Routes
    location /api/v1/auth/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With, Accept, X-Site-ID, x-site-id, X-API-Key, x-api-key, X-CSRF-Token, x-csrf-token" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age           86400 always;
        return 204;
      }

      limit_req zone=auth burst=30 nodelay;
      proxy_pass            http://127.0.0.1:3001;  # Host-level Nginx → Docker API via localhost
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
    }

    # 3. All Other API Routes
    location / {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Requested-With, Accept, X-Site-ID, x-site-id, X-API-Key, x-api-key, X-CSRF-Token, x-csrf-token" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age           86400 always;
        return 204;
      }

      limit_req zone=api burst=100 nodelay;
      proxy_pass            http://127.0.0.1:3001;
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto $scheme;
      
      # Izinkan header X-Site-ID asli dari client lewat tanpa ditimpa paksa oleh Nginx
      proxy_set_header      X-Site-ID         $http_x_site_id;
    }
  }

  # Fallback for Main Domain
  server {
    listen 443 ssl http2;
    server_name beritakarya.co www.beritakarya.co;
    
    ssl_certificate     /etc/ssl/beritakarya/fullchain.pem;
    ssl_certificate_key /etc/ssl/beritakarya/privkey.pem;

    location / {
      return 301 https://api.beritakarya.co/health;
    }
  }
}
