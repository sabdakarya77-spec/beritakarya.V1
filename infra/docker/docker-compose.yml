version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beritakarya_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beritakarya"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: