services:
  # ── DATABASE ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: beritakarya_db
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Akses dari host (lokal/vps) untuk migrasi/maintenance
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beritakarya} -d ${POSTGRES_DB:-beritakarya}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BACKEND API ───────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: beritakarya_api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_URL=https://api.beritakarya.co
      - REDIS_HOST=redis
      - MEILISEARCH_HOST=http://meilisearch:7700
      - KYC_STORAGE_PATH=/app/apps/api/uploads/kyc  # Arahkan ke volume yang sudah di-mount & punya izin apiuser
    env_file:
      - ./.env
    expose:
      - "3001" # Internal Docker network
    ports:
      - "127.0.0.1:3001:3001" # Hanya localhost VPS — Nginx host bisa reach, internet tidak
    volumes:
      - /opt/beritakarya/uploads:/app/apps/api/uploads # Bind mount agar Nginx host bisa mengakses file upload secara langsung
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── CACHE & SEARCH ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: beritakarya_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: beritakarya_meili
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-beritakarya_search_secret}
    expose:
      - "7700"
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meili_data:
